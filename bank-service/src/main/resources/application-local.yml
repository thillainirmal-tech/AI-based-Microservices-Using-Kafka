# =============================================================
# application-local.yml — bank-service
# Active when: SPRING_PROFILES_ACTIVE=local  (IntelliJ / mvn spring-boot:run)
# Credentials come from environment variables — never hardcode passwords here.
# MySQL 8 requires allowPublicKeyRetrieval=true and serverTimezone=UTC.
# =============================================================

spring:
  config:
    activate:
      on-profile: local

  datasource:
    # FIX: allowPublicKeyRetrieval=true   — MySQL 8 caching_sha2_password auth requires this
    # FIX: serverTimezone=UTC             — prevents "Server returns invalid timezone" error
    # FIX: characterEncoding=UTF-8        — ensures correct encoding for all string data
    # FIX: createDatabaseIfNotExist=true  — auto-creates bank_db on first run
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/bank_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    # Credentials from env vars. Fallbacks mirror auth-service/application-local.yml
    # and the values in .env (MYSQL_USER=root, MYSQL_PASSWORD=8870).
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASSWORD:8870}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
