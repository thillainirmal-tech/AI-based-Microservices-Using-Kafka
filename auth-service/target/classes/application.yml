spring:
  application:
    name: auth-service

  jpa:
    open-in-view: false

server:
  port: 8083

# JWT (safe fallback)
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true

# Logging
logging:
  level:
    root: INFO
    com.fraud.auth: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [traceId=%X{traceId:-NO_TRACE}] %-5level %logger{36} - %msg%n"